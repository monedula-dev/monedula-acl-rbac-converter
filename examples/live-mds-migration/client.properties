# Kafka client properties for talking to the broker's host-reachable CLIENT
# listener (SASL_PLAINTEXT / PLAIN) as the `kafka` superuser. Passed to the CLI
# via --command-config for `extract --from live` and `delete-acls`, and used by
# the in-broker kafka-acls calls in seed-acls.sh.
security.protocol=SASL_PLAINTEXT
sasl.mechanism=PLAIN
sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="kafka" password="kafka-secret";
