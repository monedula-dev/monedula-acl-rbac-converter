# A single-node Confluent stack with RBAC + MDS, for the live end-to-end
# migration example. Ported from the project's integration harness
# (internal/mdstest): OpenLDAP (MDS's identity store) + a cp-server broker that
# also hosts the Metadata Service. KRaft mode, no ZooKeeper.
#
# Driven by ./run.sh (which brings it up, seeds source ACLs, runs the pipeline
# through the on-network `converter` service, and tears it down).
services:
  openldap:
    image: osixia/openldap:1.5.0
    command: ["--copy-service"]
    networks: [default]
    environment:
      LDAP_ORGANISATION: Confluent
      LDAP_DOMAIN: confluent.io
      LDAP_ADMIN_PASSWORD: admin
    volumes:
      - ./secrets/bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/bootstrap.ldif:ro

  kafka:
    image: confluentinc/cp-server:8.2.1
    hostname: kafka
    depends_on: [openldap]
    networks: [default]
    ports:
      - "8090:8090"   # MDS REST, for host-side curls / debugging
    volumes:
      - ./secrets/keypair.pem:/tmp/conf/keypair.pem:ro
      - ./secrets/public.pem:/tmp/conf/public.pem:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:8090/security/1.0/features >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 60s
    environment:
      # --- KRaft single-node (broker + controller) ---
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9091
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:SASL_PLAINTEXT,TOKEN:SASL_PLAINTEXT,CLIENT:SASL_PLAINTEXT
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9091,INTERNAL://0.0.0.0:9092,TOKEN://0.0.0.0:9093,CLIENT://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,TOKEN://kafka:9093,CLIENT://kafka:9094
      KAFKA_CONFLUENT_AUTHORIZER_ACCESS_RULE_PROVIDERS: CONFLUENT

      # --- replication / single-node sizing ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CONFLUENT_TIER_METADATA_REPLICATION_FACTOR: "1"
      KAFKA_CONFLUENT_METADATA_TOPIC_REPLICATION_FACTOR: "1"

      # --- authorization ---
      # ANONYMOUS must stay a superuser: the KRaft CONTROLLER listener is
      # PLAINTEXT, so broker<->controller traffic authenticates as ANONYMOUS.
      # The host-reachable CLIENT listener is SASL, so no anonymous client rides on it.
      KAFKA_SUPER_USERS: User:kafka;User:mds;User:ANONYMOUS
      KAFKA_AUTHORIZER_CLASS_NAME: io.confluent.kafka.security.authorizer.ConfluentServerAuthorizer

      # --- SASL/PLAIN on INTERNAL + CLIENT; OAUTHBEARER on TOKEN ---
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_LISTENER_NAME_INTERNAL_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_LISTENER_NAME_INTERNAL_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="kafka" password="kafka-secret" user_kafka="kafka-secret";
      KAFKA_LISTENER_NAME_CLIENT_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_LISTENER_NAME_CLIENT_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="kafka" password="kafka-secret" user_kafka="kafka-secret";
      KAFKA_LISTENER_NAME_TOKEN_SASL_ENABLED_MECHANISMS: OAUTHBEARER
      KAFKA_LISTENER_NAME_TOKEN_OAUTHBEARER_SASL_SERVER_CALLBACK_HANDLER_CLASS: io.confluent.kafka.server.plugins.auth.token.TokenBearerValidatorCallbackHandler
      KAFKA_LISTENER_NAME_TOKEN_OAUTHBEARER_SASL_LOGIN_CALLBACK_HANDLER_CLASS: io.confluent.kafka.server.plugins.auth.token.TokenBearerServerLoginCallbackHandler
      KAFKA_LISTENER_NAME_TOKEN_OAUTHBEARER_SASL_JAAS_CONFIG: org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required publicKeyPath="/tmp/conf/public.pem";

      # --- Metadata Service (MDS) ---
      KAFKA_CONFLUENT_METADATA_SERVER_AUTHENTICATION_METHOD: BEARER
      KAFKA_CONFLUENT_METADATA_SERVER_LISTENERS: http://0.0.0.0:8090
      KAFKA_CONFLUENT_METADATA_SERVER_ADVERTISED_LISTENERS: http://kafka:8090
      KAFKA_CONFLUENT_METADATA_SERVER_TOKEN_MAX_LIFETIME_MS: "3600000"
      KAFKA_CONFLUENT_METADATA_SERVER_TOKEN_KEY_PATH: /tmp/conf/keypair.pem

      # --- LDAP (MDS identity provider) ---
      KAFKA_LDAP_JAVA_NAMING_FACTORY_INITIAL: com.sun.jndi.ldap.LdapCtxFactory
      KAFKA_LDAP_COM_SUN_JNDI_LDAP_READ_TIMEOUT: "3000"
      KAFKA_LDAP_JAVA_NAMING_PROVIDER_URL: ldap://openldap:389
      KAFKA_LDAP_JAVA_NAMING_SECURITY_PRINCIPAL: cn=admin,dc=confluent,dc=io
      KAFKA_LDAP_JAVA_NAMING_SECURITY_CREDENTIALS: admin
      KAFKA_LDAP_JAVA_NAMING_SECURITY_AUTHENTICATION: simple
      KAFKA_LDAP_USER_SEARCH_BASE: ou=users,dc=confluent,dc=io
      KAFKA_LDAP_GROUP_SEARCH_BASE: ou=groups,dc=confluent,dc=io
      KAFKA_LDAP_USER_NAME_ATTRIBUTE: uid
      KAFKA_LDAP_USER_OBJECT_CLASS: inetOrgPerson
      KAFKA_LDAP_GROUP_NAME_ATTRIBUTE: cn
      KAFKA_LDAP_GROUP_OBJECT_CLASS: groupOfNames
      KAFKA_LDAP_GROUP_MEMBER_ATTRIBUTE: member
      KAFKA_LDAP_GROUP_MEMBER_ATTRIBUTE_PATTERN: cn=(.*),ou=users,dc=confluent,dc=io
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN

  # The CLI itself, on the same network. Started on demand by run.sh via
  # `docker compose run`, not by `up` (hence the profile).
  converter:
    build:
      context: ../..
      dockerfile: examples/converter.Dockerfile
    image: monedula-acl-rbac:examples
    depends_on:
      kafka:
        condition: service_healthy
    networks: [default]
    working_dir: /work
    volumes:
      - ./:/work
    profiles: [tools]
