name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write   # for cosign keyless signing via GitHub OIDC

jobs:
  # Preflight mirrors ci.yml's `test` job (without coverage/fuzz, which are
  # CI-quality checks rather than release blockers) on the SAME OS matrix:
  # the release publishes Windows archives (.zip) too, so a tag must pass on
  # Windows before goreleaser signs anything. fail-fast: false so one shard's
  # failure doesn't mask the other's.
  preflight:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      # Generated-file freshness — committed tree == regenerated tree.
      # .goreleaser.yml no longer runs sync-schemas / go mod tidy itself, so
      # if these fail the release does NOT publish a tree the build would have
      # silently regenerated.
      - run: go run ./tools/sync-schemas
      - run: git diff --exit-code
      - run: go mod tidy -diff
      - name: Validate JSON Schemas
        if: runner.os == 'Linux'
        run: go run ./tools/validate-schemas
      - run: go vet ./...
      - name: golangci-lint
        if: runner.os == 'Linux'
        # Third-party action pinned to commit SHA per SLSA L2+ guidance.
        # Pinned in lock-step with ci.yml: action v9.2.1, linter v2.12.2.
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # v9.3.0
        with:
          version: v2.12.2
          install-mode: goinstall
      - run: go test -race -count=1 ./...
      - run: go test -race -count=1 -tags e2e ./tests/e2e/...
      - run: go build ./...

  goreleaser:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      # Third-party actions pinned to commit SHA per SLSA L2+ guidance.
      # Comments record the human-readable tag for dependabot to bump.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          # Pin to the 2.x line. Cosign 3.0 makes the new Sigstore bundle format
          # the default for `sign-blob`, which ignores --output-signature /
          # --output-certificate and requires --bundle — breaking the .goreleaser
          # signs config (and the .sig/.pem verification flow documented in
          # README "Verifying a release"). 2.6.0 keeps the legacy default.
          cosign-release: 'v2.6.0'
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
